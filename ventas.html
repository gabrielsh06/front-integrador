<div class="sales-wrapper">
    <div class="sales-search-group">
        <input type="text" id="sales-input-search" class="sales-input-main" placeholder="Código o Nombre del producto..." aria-label="Producto">
        <input type="number" id="sales-input-qty" class="sales-input-qty" value="1" min="1" aria-label="Cantidad">
        <button id="sales-btn-add" class="sales-btn-add">AGREGAR</button>
    </div>

    <table class="sales-table">
        <caption class="sales-table-title">Caja - Nueva Venta (BodeSmart)</caption>
        <thead class="sales-thead">
            <tr>
                <th>Código</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Precio Unit.</th>
                <th>Subtotal</th>
                <th class="sales-txt-center">ELIMINAR</th>
            </tr>
        </thead>
        <tbody id="sales-tbody"></tbody>
        <tfoot class="sales-tfoot">
            <tr class="sales-row-subtotal">
                <th colspan="4" class="sales-txt-right">SUBTOTAL:</th>
                <th colspan="2" class="sales-subtotal-price" id="sales-subtotal">S/ 0.00</th>
            </tr>
            <tr class="sales-row-igv">
                <th colspan="4" class="sales-txt-right">IGV (18%):</th>
                <th colspan="2" class="sales-igv-price" id="sales-igv">S/ 0.00</th>
            </tr>
            <tr class="sales-row-total">
                <th colspan="4" class="sales-txt-right">TOTAL A PAGAR:</th>
                <th colspan="2" class="sales-total-price" id="sales-total">S/ 0.00</th>
            </tr>
            <tr class="sales-footer-actions">
                <td colspan="6">
                    <div class="sales-action-container">
                        <button id="sales-btn-submit" class="sales-btn-submit">✅ CONFIRMAR VENTA</button>
                        <button id="sales-btn-abort" class="sales-btn-abort">🗑️ CANCELAR</button>
                    </div>
                </td>
            </tr>
        </tfoot>
    </table>

    <!-- Comprobante -->
    <div id="sales-comprobante" class="sales-comprobante" style="display:none;">
        <div class="comprobante-box">
            <h2>✅ Venta Registrada</h2>
            <p id="comp-id"></p>
            <p id="comp-fecha"></p>
            <p id="comp-cliente"></p>
            <table class="comp-tabla">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cant.</th>
                        <th>P.Unit</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="comp-tbody"></tbody>
            </table>
            <p id="comp-subtotal"></p>
            <p id="comp-igv"></p>
            <p class="comp-total" id="comp-total"></p>
            <p class="comp-total" id="comp-total"></p>
            <button id="comp-btn-cerrar" class="sales-btn-add">Cerrar</button>
            <button id="descargar-pdf" class="sales-btn-add" onclick="descargarPDF()">Descargar PDF</button>
        </div>
    </div>
</div>
